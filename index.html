<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionnaire de Tâches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<style type="text/tailwindcss">
  @theme {
    --color-Tc-pink: #ff1493;
    --color-Tc-pink-300: #f30083;
    --color-Tc-gray-400: #39393a
  }
  body {@apply bg-[#1a1a1a] text-gray-200 text-[16px] px-[300px] py-[60px] space-y-15}

  input {@apply h-[70px] w-full px-[12px] outline-1 outline-Tc-gray-400 hover:outline-gray-400 !bg-transparent placeholder:text-lg}
  input:focus-within {@apply outline-Tc-pink !bg-transparent}

  .li-list { @apply border-b border-b-Tc-gray-400 w-full pb-[20px] flex items-center text-xl}

  .delete { @apply outline-none px-[7px] h-[55px] rounded-md bg-red-700 cursor-pointer ml-auto}
</style>
<body>

  <div class="space-y-3">
    <div id="Date_Container" class="space-x-2 text-md"></div>
    <h1 class="title text-4xl">Salut, Maryam</h1>
  </div>

  <div class="border border-Tc-gray-400 border-solid w-full h-full p-[50px] flex flex-col items-start space-y-8">

    <div class="flex gap-7 w-full">
      <input id="input_todo" type="text" placeholder="Créer une tâche" autocomplete="off">

    <button id="add_todo" class="outline-none bg-Tc-pink px-[15px] h-[70px] rounded-md hover:bg-Tc-pink-300 cursor-pointer w-fitt">
      <img src="assets/add_circle_36dp_E3E3E3_FILL0_wght400_GRAD0_opsz40.svg" alt="">
    </button>
  </div>
    <ul id="list_todo" class="space-y-5 w-[908px]">

    </ul>

    
  </div>

  <script src="script.js"></script>
</body>
</html>
