<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionnaire de Tâches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<style type="text/tailwindcss">
  @theme {
    --color-Tc-pink: #ff1493;
    --color-Tc-pink-300: #f30083;
    --color-Tc-gray-400: #39393a;
    --color-Tc-gray-600: #222222
  }
  body {@apply bg-[#1a1a1a] text-gray-200 text-[16px] px-[300px] py-[60px] space-y-15}

  .input_todo {@apply h-[70px] w-full px-[12px] outline-1 outline-Tc-gray-400 hover:outline-gray-400 !bg-transparent placeholder:text-lg}
  .input_todo:focus-within {@apply outline-Tc-pink !bg-transparent}

  .check {@apply w-[24px] h-[24px] appearance-none outline-1 outline-Tc-gray-400 hover:outline-gray-400 cursor-pointer checked:bg-[#23BD33] rounded-full}

  .li-list { @apply space-x-3 border-b border-b-Tc-gray-400 w-full pb-[20px] flex items-center text-xl}

  .delete { @apply outline-none px-[7px] h-[55px] rounded-md bg-red-700 cursor-pointer ml-auto}

  .btns {@apply text-gray-400 hover:text-white mb-5 pb-[22px] border-b border-b-transparent hover:border-b hover:border-b-white cursor-pointer font-medium }
</style>
<body>

  <div class="flex justify-between">
    <div class="space-y-3">
      <div id="Date_Container" class="space-x-2 text-md"></div>
      <h1 class="title text-4xl">Salut, Maryam</h1>
    </div>
    <p class="mt-auto bg-Tc-gray-600 text-gray-400 py-[5px] px-[10px] rounded-md"><span>2 </span> non terminées</p>
  </div>

  <div class="bg-Tc-gray-600 border border-Tc-gray-400 border-solid w-full h-full p-[50px] flex flex-col items-start space-y-8">
    
    <div class="space-x-6 w-full relative ">
      <button class="btns">Toutes</button>
      <button class="btns">Actives</button>
      <button class="btns">Terminées</button>
      <div class="absolute left-0 right-0 h-[1px] w-full bg-Tc-gray-400 bottom-[18px]"></div>
    </div>
    
    <div class="flex gap-7 w-full">
      <input id="input_todo" class="input_todo" type="text" placeholder="Créer une tâche" autocomplete="off">

    <button id="add_todo" class="outline-none bg-Tc-pink px-[15px] h-[70px] rounded-md hover:bg-Tc-pink-300 cursor-pointer w-fitt">
      <img src="assets/add_circle_36dp_E3E3E3_FILL0_wght400_GRAD0_opsz40.svg" alt="">
    </button>
  </div>
    <ul id="list_todo" class="space-y-5 w-[908px]">

    </ul>

    
  </div>

  <script src="script.js"></script>
</body>
</html>
